<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#061b2a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Intervention feux">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <title>Compte rendu intervention</title>

  <style>
    :root {
      --navy: #061b2a;
      --green: #72bf3f;
      --teal: #4b93a8;
      --text: #071827;
      --error: #d93025;
    }

    * {
      box-sizing: border-box;
      min-width: 0;
    }

    html {
      font-size: 20px;
      -webkit-text-size-adjust: 100%;
    }

    body {
      width: 100%;
      margin: 0;
      overflow-x: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #e9f5f7 0%, #f7fbf4 100%);
      color: var(--text);
    }

    .app {
      width: 100%;
      max-width: none;
      min-height: 100vh;
      margin: 0;
      overflow-x: hidden;
      background: rgba(255, 255, 255, 0.98);
    }

    .header {
      padding: 6px 10px 8px;
      text-align: center;
      background:
        radial-gradient(circle at top left, rgba(75, 147, 168, 0.25), transparent 36%),
        radial-gradient(circle at top right, rgba(114, 191, 63, 0.18), transparent 40%),
        linear-gradient(135deg, #e4f3f5 0%, #f6fbf3 100%);
      border-bottom: 6px solid var(--green);
    }

    .header-logo {
      display: block;
      width: min(86vw, 340px);
      height: auto;
      margin: 0 auto;
    }

    .header h1 {
      width: 100%;
      margin: 0 auto;
      color: var(--navy);
      font-size: clamp(1.9rem, 9.5vw, 2.35rem);
      line-height: 1.02;
      font-weight: 900;
      text-align: center;
    }

    .step {
      width: 100%;
      padding: 18px 10px 38px;
      overflow-x: hidden;
    }

    label,
    .step-title {
      display: block;
      margin: 0 0 14px;
      color: var(--navy);
      font-size: 1.7rem;
      line-height: 1.12;
      font-weight: 900;
    }

    .required {
      color: var(--green);
    }

    select,
    input,
    textarea {
      display: block;
      width: 100%;
      max-width: 100%;
      min-height: 82px;
      margin: 0 0 28px;
      padding: 20px 16px;
      border: 3px solid #bfd4da;
      border-radius: 16px;
      outline: none;
      background-color: #ffffff;
      color: var(--text);
      font-size: 1.6rem;
      line-height: 1.2;
      appearance: none;
      -webkit-appearance: none;
    }

    select {
      padding-right: 56px;
    }

    select:focus,
    input:focus,
    textarea:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 6px rgba(75, 147, 168, 0.18);
    }

    textarea {
      min-height: 220px;
      resize: vertical;
    }

    .summary {
      width: 100%;
      margin: 0 0 28px;
      padding: 18px;
      border-left: 8px solid var(--teal);
      border-radius: 16px;
      background: linear-gradient(135deg, #eef8fb 0%, #f7fbf2 100%);
      color: var(--navy);
      font-size: 1.25rem;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .choice-list {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      width: 100%;
    }

    .choice-button,
    button {
      width: 100%;
      min-height: 88px;
      padding: 22px 18px;
      border: 0;
      border-radius: 16px;
      font-size: 1.58rem;
      line-height: 1.15;
      font-weight: 900;
      cursor: pointer;
    }

    .choice-button {
      border: 3px solid #cfe2e7;
      background: #ffffff;
      color: var(--navy);
      text-align: left;
      box-shadow: 0 8px 20px rgba(6, 27, 42, 0.06);
      overflow-wrap: anywhere;
    }

    .primary {
      background: var(--green);
      color: #ffffff;
      box-shadow: 0 12px 26px rgba(114, 191, 63, 0.28);
    }

    .secondary {
      background: #e7f0f3;
      color: var(--navy);
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      margin-top: 18px;
    }

    .field-error {
      border-color: var(--error) !important;
      box-shadow: 0 0 0 6px rgba(217, 48, 37, 0.14) !important;
    }

    .error-message,
    .debug-error {
      margin: 0 0 24px;
      padding: 16px;
      border-radius: 14px;
      background: #fde8e8;
      color: var(--error);
      font-size: 1.2rem;
      font-weight: 900;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }

    .photo-list {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
      margin: 0 0 28px;
    }

    .photo-item {
      padding: 16px;
      border-radius: 14px;
      background: #eef8fb;
      color: var(--navy);
      font-size: 1.2rem;
      font-weight: 800;
      overflow-wrap: anywhere;
    }

    .message {
      width: 100%;
      margin: 0 0 24px;
      padding: 22px;
      border-left: 8px solid var(--green);
      border-radius: 16px;
      background: #eef8fb;
      color: var(--navy);
      font-size: 1.35rem;
      line-height: 1.35;
      font-weight: 800;
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="header">
      <img class="header-logo" src="logo.png" alt="ELEMENT Technology">
      <h1>Compte rendu intervention</h1>
    </div>

    <main id="app" class="step">
      <div class="message">Chargement du formulaire...</div>
    </main>
  </div>

  <script src="data.js"></script>
  <script>
    var API_URL = "https://script.google.com/macros/s/AKfycbwdv8DpFezJxHX1Xuz8X3_papW86CqQ2W8tYa7qTvEqqf4CjKuKyUG9JlXp5NOtBRU8/exec";

    var TECHNICIANS = [
      "Anderson Luzaka",
      "Steven Joseph",
      "Florian Mariller",
      "Nicolas Tyrache"
    ];

    var state = {
      step: "secteur",
      secteur: "",
      ville: "",
      carrefour: "",
      photos: [],
      formValues: {}
    };

    var app = document.getElementById("app");

    function safeRun(fn) {
      try {
        fn();
      } catch (error) {
        app.innerHTML =
          '<div class="debug-error">' +
          'Erreur dans le formulaire :<br><br>' +
          escapeHtml(error && error.message ? error.message : String(error)) +
          '</div>';
      }
    }

    function render() {
      safeRun(function() {
        if (state.step === "secteur") renderSecteurs();
        if (state.step === "ville") renderVilles();
        if (state.step === "carrefour") renderCarrefours();
        if (state.step === "form") renderForm();
        if (state.step === "preview") renderPreview();
        if (state.step === "success") renderSuccess();

        window.scrollTo({ top: 0, behavior: "smooth" });
      });
    }

    function renderSecteurs() {
      app.innerHTML =
        '<div class="step-title">Secteur <span class="required">*</span></div>' +
        '<div id="choices" class="choice-list"></div>';

      renderChoiceButtons(Object.keys(DATA), function(secteur) {
        state.secteur = secteur;
        state.ville = "";
        state.carrefour = "";
        state.step = "ville";
        render();
      });
    }

    function renderVilles() {
      var villes = Object.keys(DATA[state.secteur] || {});

      app.innerHTML =
        summaryHtml() +
        '<div class="step-title">Ville <span class="required">*</span></div>' +
        '<div id="choices" class="choice-list"></div>' +
        '<div class="actions">' +
        '<button type="button" class="secondary" onclick="goBack()">Retour</button>' +
        '</div>';

      renderChoiceButtons(villes, function(ville) {
        state.ville = ville;
        state.carrefour = "";
        state.step = "carrefour";
        render();
      });
    }

    function renderCarrefours() {
      var carrefours = ((DATA[state.secteur] || {})[state.ville] || []).slice();
      carrefours.push("Autre");

      app.innerHTML =
        summaryHtml() +
        '<div class="step-title">Carrefour <span class="required">*</span></div>' +
        '<div id="choices" class="choice-list"></div>' +
        '<div class="actions">' +
        '<button type="button" class="secondary" onclick="goBack()">Retour</button>' +
        '</div>';

      renderChoiceButtons(carrefours, function(carrefour) {
        state.carrefour = carrefour;
        state.step = "form";
        render();
      });
    }

    function renderChoiceButtons(items, onSelect) {
      var container = document.getElementById("choices");
      container.innerHTML = "";

      items.forEach(function(label) {
        var button = document.createElement("button");
        button.type = "button";
        button.className = "choice-button";
        button.textContent = label;
        button.addEventListener("click", function() {
          onSelect(label);
        });
        container.appendChild(button);
      });
    }

    function renderForm() {
      app.innerHTML =
        summaryHtml() +

        '<label for="technician">Technicien <span class="required">*</span></label>' +
        '<select id="technician" data-required="1">' +
        '<option value="">Selectionner</option>' +
        TECHNICIANS.map(function(name) {
          return '<option value="' + escapeHtml(name) + '">' + escapeHtml(name) + '</option>';
        }).join("") +
        '</select>' +

        '<label for="interventionDate">Date d intervention <span class="required">*</span></label>' +
        '<input id="interventionDate" type="date" data-required="1">' +

        '<label for="arrivalTime">Heure d arrivee <span class="required">*</span></label>' +
        '<input id="arrivalTime" type="time" data-required="1">' +

        '<label for="departureTime">Heure de depart <span class="required">*</span></label>' +
        '<input id="departureTime" type="time" data-required="1">' +

        '<label for="arrivalObservation">Constat a l arrivee <span class="required">*</span></label>' +
        '<textarea id="arrivalObservation" data-required="1"></textarea>' +

        '<label for="workDone">Actions realisees <span class="required">*</span></label>' +
        '<textarea id="workDone" data-required="1"></textarea>' +

        '<label for="materialUsed">Materiel remplace / depose / securise</label>' +
        '<textarea id="materialUsed"></textarea>' +

        '<label for="finalStatus">Etat final de l intervention <span class="required">*</span></label>' +
        '<select id="finalStatus" data-required="1">' +
        '<option value="">Selectionner</option>' +
        '<option value="Repare / remis en service">Repare / remis en service</option>' +
        '<option value="Securise provisoirement">Securise provisoirement</option>' +
        '<option value="A suivre">A suivre</option>' +
        '<option value="Non resolu">Non resolu</option>' +
        '</select>' +

        '<label for="nextStep">Suite a prevoir</label>' +
        '<textarea id="nextStep"></textarea>' +

        '<label for="photosInput">Photos</label>' +
        '<input id="photosInput" type="file" accept="image/*" capture="environment" multiple onchange="handlePhotos(this.files)">' +
        '<div id="photoList" class="photo-list"></div>' +

        '<label for="observations">Observations</label>' +
        '<textarea id="observations"></textarea>' +

        '<div class="actions">' +
        '<button type="button" class="secondary" onclick="goBack()">Retour</button>' +
        '<button type="button" class="primary" onclick="goPreview()">Continuer</button>' +
        '</div>';

      restoreFormValues();
      renderPhotoList();
    }

    function renderPreview() {
      var data = getFormData();

      app.innerHTML =
        '<div class="step-title">Verification</div>' +
        summaryHtml() +
        '<div class="summary">' +
        '<strong>Technicien :</strong> ' + escapeHtml(data.technician) + '<br>' +
        '<strong>Date :</strong> ' + escapeHtml(data.interventionDate) + '<br>' +
        '<strong>Heure d arrivee :</strong> ' + escapeHtml(data.arrivalTime) + '<br>' +
        '<strong>Heure de depart :</strong> ' + escapeHtml(data.departureTime) + '<br><br>' +
        '<strong>Constat a l arrivee :</strong><br>' + nl2br(data.arrivalObservation) + '<br><br>' +
        '<strong>Actions realisees :</strong><br>' + nl2br(data.workDone) + '<br><br>' +
        '<strong>Materiel :</strong><br>' + nl2br(data.materialUsed || "Non renseigne") + '<br><br>' +
        '<strong>Etat final :</strong><br>' + escapeHtml(data.finalStatus) + '<br><br>' +
        '<strong>Suite a prevoir :</strong><br>' + nl2br(data.nextStep || "Non renseigne") + '<br><br>' +
        '<strong>Photos :</strong> ' + state.photos.length + '<br><br>' +
        '<strong>Observations :</strong><br>' + nl2br(data.observations || "Non renseigne") +
        '</div>' +
        '<div id="submitMessage"></div>' +
        '<div class="actions">' +
        '<button type="button" class="secondary" onclick="state.step=\'form\'; render();">Modifier</button>' +
        '<button id="submitButton" type="button" class="primary" onclick="submitReport()">Envoyer</button>' +
        '</div>';
    }

    function renderSuccess() {
      app.innerHTML =
        '<div class="step-title">Compte rendu envoye</div>' +
        '<div class="message">Le compte rendu a bien ete transmis.</div>' +
        '<div class="actions">' +
        '<button type="button" class="primary" onclick="resetForm()">Nouvelle intervention</button>' +
        '</div>';
    }

    function goBack() {
      if (state.step === "ville") state.step = "secteur";
      else if (state.step === "carrefour") state.step = "ville";
      else if (state.step === "form") state.step = "carrefour";
      else if (state.step === "preview") state.step = "form";
      render();
    }

    function goPreview() {
      saveCurrentFormValues();
      if (!validateForm()) return;
      state.step = "preview";
      render();
    }

    function validateForm() {
      clearErrors();

      var fields = Array.prototype.slice.call(document.querySelectorAll("[data-required='1']"));
      var firstError = null;

      fields.forEach(function(field) {
        if (!field.value || !field.value.trim()) {
          field.classList.add("field-error");
          if (!firstError) firstError = field;
        }
      });

      if (firstError) {
        var message = document.createElement("div");
        message.className = "error-message";
        message.textContent = "Merci de remplir ce champ.";
        firstError.insertAdjacentElement("afterend", message);
        firstError.scrollIntoView({ behavior: "smooth", block: "center" });
        setTimeout(function() {
          firstError.focus({ preventScroll: true });
        }, 350);
        return false;
      }

      return true;
    }

    function getFormData() {
      return {
        secteur: state.secteur,
        ville: state.ville,
        carrefour: state.carrefour,
        technician: valueOf("technician"),
        interventionDate: valueOf("interventionDate"),
        arrivalTime: valueOf("arrivalTime"),
        departureTime: valueOf("departureTime"),
        arrivalObservation: valueOf("arrivalObservation"),
        workDone: valueOf("workDone"),
        materialUsed: valueOf("materialUsed"),
        finalStatus: valueOf("finalStatus"),
        nextStep: valueOf("nextStep"),
        observations: valueOf("observations"),
        photos: state.photos
      };
    }

    function saveCurrentFormValues() {
      state.formValues = getFormData();
    }

    function restoreFormValues() {
      var values = state.formValues || {};
      Object.keys(values).forEach(function(id) {
        var el = document.getElementById(id);
        if (el && typeof values[id] === "string") el.value = values[id];
      });
    }

    function valueOf(id) {
      var el = document.getElementById(id);
      if (el) return el.value || "";
      if (state.formValues && state.formValues[id] !== undefined) return state.formValues[id] || "";
      return "";
    }

    function handlePhotos(files) {
      var incoming = Array.prototype.slice.call(files || []);
      if (!incoming.length) return;

      var maxTotal = 3;
      var remaining = maxTotal - state.photos.length;
      var selected = incoming.slice(0, Math.max(0, remaining));

      if (!selected.length) {
        alert("Maximum 3 photos par intervention.");
        document.getElementById("photosInput").value = "";
        return;
      }

      Promise.all(selected.map(fileToPhoto)).then(function(items) {
        state.photos = state.photos.concat(items).slice(0, maxTotal);
        renderPhotoList();
        document.getElementById("photosInput").value = "";
      }).catch(function(error) {
        alert("Erreur pendant la lecture de la photo : " + error.message);
      });
    }

    function fileToPhoto(file) {
      return new Promise(function(resolve, reject) {
        var reader = new FileReader();

        reader.onerror = function() {
          reject(new Error("lecture impossible"));
        };

        reader.onload = function(event) {
          var image = new Image();

          image.onerror = function() {
            reject(new Error("image impossible a ouvrir"));
          };

          image.onload = function() {
            var canvas = document.createElement("canvas");
            var maxSize = 1400;
            var width = image.width;
            var height = image.height;

            if (width > height && width > maxSize) {
              height = Math.round(height * maxSize / width);
              width = maxSize;
            } else if (height > maxSize) {
              width = Math.round(width * maxSize / height);
              height = maxSize;
            }

            canvas.width = width;
            canvas.height = height;

            var ctx = canvas.getContext("2d");
            ctx.drawImage(image, 0, 0, width, height);

            var dataUrl = canvas.toDataURL("image/jpeg", 0.78);

            resolve({
              name: file.name || ("photo-" + Date.now() + ".jpg"),
              mimeType: "image/jpeg",
              data: dataUrl.split(",")[1]
            });
          };

          image.src = event.target.result;
        };

        reader.readAsDataURL(file);
      });
    }

    function renderPhotoList() {
      var list = document.getElementById("photoList");
      if (!list) return;

      if (!state.photos.length) {
        list.innerHTML = "";
        return;
      }

      list.innerHTML = state.photos.map(function(photo, index) {
        return (
          '<div class="photo-item">' +
          'Photo ' + (index + 1) + ' : ' + escapeHtml(photo.name) +
          '<br><br>' +
          '<button type="button" class="secondary" onclick="removePhoto(' + index + ')">Retirer</button>' +
          '</div>'
        );
      }).join("");
    }

    function removePhoto(index) {
      state.photos.splice(index, 1);
      renderPhotoList();
    }

    function submitReport() {
      var button = document.getElementById("submitButton");
      var message = document.getElementById("submitMessage");
      var data = getFormData();

      button.disabled = true;
      button.textContent = "Envoi en cours...";
      message.innerHTML = "";

      var payload = new URLSearchParams();
      payload.append("payload", JSON.stringify(data));

      fetch(API_URL, {
        method: "POST",
        mode: "no-cors",
        body: payload
      }).then(function() {
        state.step = "success";
        render();
      }).catch(function(error) {
        message.innerHTML =
          '<div class="error-message">Erreur pendant l envoi : ' +
          escapeHtml(error.message || error) +
          '</div>';
        button.disabled = false;
        button.textContent = "Envoyer";
      });
    }

    function resetForm() {
      state.step = "secteur";
      state.secteur = "";
      state.ville = "";
      state.carrefour = "";
      state.photos = [];
      state.formValues = {};
      render();
    }

    function summaryHtml() {
      var lines = [];

      if (state.secteur) lines.push("<strong>Secteur :</strong> " + escapeHtml(state.secteur));
      if (state.ville) lines.push("<strong>Ville :</strong> " + escapeHtml(state.ville));
      if (state.carrefour) lines.push("<strong>Carrefour :</strong> " + escapeHtml(state.carrefour));

      if (!lines.length) return "";
      return '<div class="summary">' + lines.join("<br>") + "</div>";
    }

    function clearErrors() {
      Array.prototype.slice.call(document.querySelectorAll(".error-message")).forEach(function(el) {
        el.remove();
      });

      Array.prototype.slice.call(document.querySelectorAll(".field-error")).forEach(function(el) {
        el.classList.remove("field-error");
      });
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function nl2br(value) {
      return escapeHtml(value || "").replace(/\n/g, "<br>");
    }

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js").catch(function() {});
    }

    render();
  </script>
</body>
</html>
